# docker-compose file for pulling pre-built images from GHCR
# Usage: docker compose -f docker-compose.ghcr.yaml up -d
#
# Replace silvarna below with your actual GitHub username
# (the same username used in your fork)

services:
  db:
    image: ghcr.io/silvarna/lifeforge-db:latest
    container_name: lifeforge-db
    restart: unless-stopped
    env_file:
      - ./env/.env.docker
    environment:
      - DOCKER_MODE=true
      - PB_BINARY_PATH=/usr/local/bin/pocketbase
      - PB_DIR=/pb_data
    expose:
      - '8090'
    volumes:
      - ./database/pb_data:/pb_data
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8090/api/health || exit 1
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  db-init:
    image: ghcr.io/silvarna/lifeforge-db-init:latest
    container_name: lifeforge-db-init
    env_file:
      - ./env/.env.docker
    environment:
      - DOCKER_MODE=true
      - PB_DIR=/pb_data
      - PB_HOST=http://0.0.0.0:8090
    volumes:
      - ./database/pb_data:/pb_data
      - ./modules:/app/modules
      - ./locales:/app/locales
    depends_on:
      db:
        condition: service_healthy

  server:
    image: ghcr.io/silvarna/lifeforge-server:latest
    container_name: lifeforge-server
    restart: unless-stopped
    env_file:
      - ./env/.env.docker
    environment:
      - DOCKER_MODE=true
      - NODE_ENV=production
      - PB_HOST=http://db:8090
    expose:
      - '3636'
    volumes:
      - ./modules:/lifeforge/modules
      - ./locales:/lifeforge/locales
    depends_on:
      db-init:
        condition: service_completed_successfully

  client:
    image: ghcr.io/YOUR_GITHUB_USERNAME/lifeforge-client:latest
    container_name: lifeforge-client
    restart: unless-stopped
    ports:
      - '62926:80'
    depends_on:
      server:
        condition: service_started
