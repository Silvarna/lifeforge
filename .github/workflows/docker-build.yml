name: Build and Push Docker Images to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push lifeforge-db
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/db/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/lifeforge-db:latest
          platforms: linux/amd64
          cache-from: type=gha,scope=db
          cache-to: type=gha,mode=max,scope=db

      - name: Build and push lifeforge-db-init
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/db-init/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/lifeforge-db-init:latest
          platforms: linux/amd64
          cache-from: type=gha,scope=db-init
          cache-to: type=gha,mode=max,scope=db-init

      - name: Build and push lifeforge-server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/server/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/lifeforge-server:latest
          platforms: linux/amd64
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build and push lifeforge-client
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/client/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/lifeforge-client:latest
          platforms: linux/amd64
          build-args: |
            VITE_API_HOST=/api
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client
